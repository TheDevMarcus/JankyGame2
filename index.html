<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>JANKY RUNNER</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Share+Tech+Mono&display=swap');
*{margin:0;padding:0;box-sizing:border-box}
body{background:#0a0a0a;overflow:hidden;font-family:'Share Tech Mono',monospace;color:#ccc;cursor:default;image-rendering:pixelated}
body::after{content:'';position:fixed;inset:0;background:repeating-linear-gradient(0deg,transparent,transparent 3px,rgba(0,0,0,.12) 3px,rgba(0,0,0,.12) 4px);pointer-events:none;z-index:999}
canvas{display:block;width:100vw;height:100vh;position:fixed;inset:0}
#ui{position:fixed;inset:0;pointer-events:none;z-index:10}
.layer{position:absolute;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center;pointer-events:all}
.layer.off{display:none}
#hud{position:absolute;inset:0;pointer-events:none;padding:10px 14px;display:flex;flex-direction:column;justify-content:space-between}
#hud-top{display:flex;justify-content:space-between;align-items:flex-start}
#hud-bot{display:flex;justify-content:space-between;align-items:flex-end}
.hlbl{font-size:9px;letter-spacing:1px;color:#556;font-family:'Share Tech Mono'}
.hbig{font-size:20px;font-weight:400;color:#aef;letter-spacing:1px;line-height:1;font-family:'Share Tech Mono'}
.hsub{font-size:9px;font-family:'Share Tech Mono';color:#aa8}
#sector-pill{color:#bb9;font-size:9px;letter-spacing:1px;padding:3px 8px;font-family:'Share Tech Mono';border:1px dashed #443;background:#111}
#coins-pill{display:flex;align-items:center;gap:4px;font-size:11px;font-family:'Share Tech Mono';color:#ba7;border:1px dashed #443;padding:3px 8px;background:#111}
.bgrp{display:flex;flex-direction:column;gap:3px;min-width:100px}
.bgrp.r{align-items:flex-end}
.bwrap{height:6px;background:#1a1a1a;border:1px solid #333;overflow:hidden}
.bfill{height:100%;transition:width .08s}
#sh-fill{background:#4a8a6a;width:100%}
#ab-fill{width:100%}
#timer-d{font-size:10px;font-family:'Share Tech Mono';color:#556}
#ab-lbl{font-size:8px;letter-spacing:1px;font-family:'Share Tech Mono';margin-bottom:2px;color:#556}
#bnd-flash{position:absolute;inset:0;pointer-events:none;border:2px solid transparent}
#bnd-flash.lit{animation:bfl .28s ease-out forwards}
@keyframes bfl{0%{border-color:rgba(200,60,60,.9);box-shadow:inset 0 0 40px rgba(180,0,0,.15)}100%{border-color:transparent;box-shadow:none}}
#pop{position:absolute;top:38%;left:50%;transform:translate(-50%,-50%);font-size:18px;font-weight:400;letter-spacing:2px;pointer-events:none;display:none;white-space:nowrap;font-family:'Share Tech Mono';color:#ddd}
@keyframes popA{0%{opacity:1;transform:translate(-50%,-50%) scale(.6)}50%{opacity:1;transform:translate(-50%,-58%) scale(1.04)}100%{opacity:0;transform:translate(-50%,-80%) scale(.95)}}
.sbg{background:#0a0a0a}
.logo{font-size:clamp(24px,5.5vw,52px);font-weight:400;letter-spacing:4px;color:#8bc;font-family:'Share Tech Mono';text-shadow:2px 2px 0 #024,0 0 18px rgba(100,180,220,.3)}
.tagline{font-size:9px;letter-spacing:3px;color:#445;font-family:'Share Tech Mono';margin-top:4px;margin-bottom:24px}
.btn{display:inline-flex;align-items:center;justify-content:center;padding:8px 22px;background:#111;border:1px solid #444;font-family:'Share Tech Mono';font-size:10px;font-weight:400;letter-spacing:2px;cursor:pointer;text-transform:uppercase;color:#aaa;margin:4px;transition:background .12s,color .12s}
.btn:hover{background:#222;color:#ddd;border-color:#666}
.bc{border-color:#446;color:#8bc}.bc:hover{background:#112233;color:#adf}
.bg2{border-color:#543;color:#ba7}.bg2:hover{background:#221a0a;color:#dca}
.bw2{border-color:#333;color:#667}.bw2:hover{background:#1a1a1a;color:#999}
.bred{border-color:#522;color:#a55}.bred:hover{background:#1a0a0a;color:#d77}
.brow{display:flex;flex-wrap:wrap;gap:6px;justify-content:center;margin-top:8px}
#pause-over{position:fixed;inset:0;background:rgba(0,0,0,.88);display:none;flex-direction:column;align-items:center;justify-content:center;gap:12px;z-index:40;pointer-events:all;cursor:default}
#pause-over.show{display:flex}
#pause-over h2{font-size:clamp(18px,3.5vw,36px);font-weight:400;letter-spacing:4px;color:#8bc;font-family:'Share Tech Mono';margin-bottom:4px;text-shadow:2px 2px 0 #024}
#pause-over .ph{font-size:9px;letter-spacing:2px;color:#445;font-family:'Share Tech Mono';margin-bottom:8px}
#death-overlay{position:fixed;inset:0;background:rgba(180,30,30,0);z-index:35;pointer-events:none;display:none}
#death-overlay.flash{animation:dfl .4s ease-out forwards}
@keyframes dfl{0%{background:rgba(180,30,30,.55)}100%{background:rgba(180,30,30,0)}}
#ov{overflow-y:auto;padding:18px 14px 36px;background:#0a0a0a;cursor:default;opacity:0;transition:opacity .6s ease}
#ov.off{display:none}
#ov.fadein{opacity:1}
.ov-title{font-size:clamp(13px,2.5vw,20px);font-weight:400;letter-spacing:3px;color:#c55;margin-bottom:2px;font-family:'Share Tech Mono'}
.ov-sub{font-size:8px;letter-spacing:3px;color:#445;font-family:'Share Tech Mono';margin-bottom:12px}
.stat-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:5px;width:100%;max-width:480px;margin-bottom:10px}
.stat-card{padding:8px 5px;text-align:center;background:#111;border:1px solid #2a2a2a}
.stat-card.g{border-color:#433;background:#171208}
.sc-lbl{font-size:7px;letter-spacing:1px;color:#445;font-family:'Share Tech Mono';margin-bottom:3px}
.sc-val{font-size:14px;font-weight:400;color:#8bc;font-family:'Share Tech Mono'}
.stat-card.g .sc-val{color:#ba7}
.shdr{font-size:8px;letter-spacing:2px;color:#445;font-family:'Share Tech Mono';margin:10px 0 5px;width:100%;max-width:480px;border-bottom:1px dashed #222;padding-bottom:4px}
.ml-list{width:100%;max-width:480px;margin-bottom:3px}
.ml-row{display:flex;justify-content:space-between;padding:3px 0;border-bottom:1px solid #1a1a1a;font-size:8px;font-family:'Share Tech Mono'}
.ml-row .mn{color:#445}.ml-row .mc{color:#665}
.ml-row.hit .mn{color:#8bc}.ml-row.hit .mc{color:#ba7}
.earn-box{width:100%;max-width:480px;padding:7px 10px;background:#111;border:1px dashed #433;font-family:'Share Tech Mono';font-size:8px;color:#775;margin-bottom:3px;display:flex;justify-content:space-between;align-items:center}
.earn-big{font-size:14px;color:#ba7;font-family:'Share Tech Mono'}
.hs-list{width:100%;max-width:480px;margin-bottom:10px}
.hs-row{display:flex;justify-content:space-between;padding:3px 0;border-bottom:1px solid #1a1a1a;font-family:'Share Tech Mono';font-size:10px}
.hs-row .rk{color:#665;width:24px}.hs-row .sv2{color:#7ab}
.hs-row.nw .sv2{color:#adf}
#ach-modal{position:fixed;inset:0;background:#0a0a0a;z-index:100;display:none;flex-direction:column;align-items:center;justify-content:flex-start;overflow-y:auto;padding:24px 14px 44px;cursor:default;pointer-events:all}
#ach-modal.show{display:flex}
.modal-title{font-size:clamp(14px,3vw,26px);font-weight:400;letter-spacing:4px;color:#8bc;font-family:'Share Tech Mono';margin-bottom:16px;text-shadow:2px 2px 0 #024}
.ach-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(196px,1fr));gap:8px;width:100%;max-width:680px;margin-bottom:18px}
.ach-card{border:1px solid #1e1e1e;background:#0e0e0e;padding:9px 11px;position:relative}
.ach-card.unlocked{border-color:#433;background:#130f08}
.ach-icon{font-size:20px;margin-bottom:4px;opacity:.18;filter:grayscale(1)}
.ach-card.unlocked .ach-icon{opacity:1;filter:none}
.ach-name{font-size:8px;letter-spacing:2px;color:#333;margin-bottom:3px;font-family:'Share Tech Mono'}
.ach-card.unlocked .ach-name{color:#ba7}
.ach-desc{font-size:7px;color:#2a2a2a;font-family:'Share Tech Mono';line-height:1.7}
.ach-card.unlocked .ach-desc{color:#556}
.ach-reward{font-size:7px;color:#442;font-family:'Share Tech Mono';margin-top:3px}
.ach-card.unlocked .ach-reward{color:#887}
.ach-badge{position:absolute;top:5px;right:6px;font-size:7px;color:#ba7;display:none;font-family:'Share Tech Mono'}
.ach-card.unlocked .ach-badge{display:block}
#shop{overflow-y:auto;padding:18px 12px 40px;background:#0a0a0a;cursor:default;align-items:center;justify-content:flex-start}
#shop.off{display:none}
.shop-ttl{font-size:clamp(14px,3vw,28px);font-weight:400;letter-spacing:4px;color:#ba7;font-family:'Share Tech Mono';margin-bottom:4px;text-shadow:2px 2px 0 #210}
.shop-c{font-size:10px;color:#665;font-family:'Share Tech Mono';letter-spacing:1px;margin-bottom:13px}
.ship-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(128px,1fr));gap:7px;width:100%;max-width:900px;margin-bottom:13px}
.ship-card{border:1px solid #222;background:#0d0d0d;padding:8px 6px 7px;text-align:center;cursor:pointer;transition:background .1s;position:relative;display:flex;flex-direction:column;align-items:center}
.ship-card:hover{background:#161616;border-color:#444}
.ship-card.owned{border-color:#2a3320}
.ship-card.active{border-color:#554;background:#141208}
.ship-svg{width:32px;height:38px;margin-bottom:5px;display:block}
.ship-name{font-size:8px;letter-spacing:2px;margin-bottom:2px;color:#888;font-family:'Share Tech Mono'}
.ab-tag{font-size:7px;letter-spacing:1px;padding:2px 5px;display:inline-block;margin-bottom:3px;cursor:pointer;border:1px dashed #333;color:#556;font-family:'Share Tech Mono'}
.ab-tag:hover{color:#889}
.ship-cost{font-size:8px;color:#665;font-family:'Share Tech Mono'}
.cbadge{position:absolute;top:3px;right:3px;font-size:7px;padding:1px 3px;font-family:'Share Tech Mono';color:#665}
.cb-o{color:#4a6a3a}.cb-a{color:#ba7;border:1px dashed #443}
#tooltip{position:fixed;z-index:200;background:#0d0d0d;border:1px solid #333;padding:9px 12px;max-width:240px;pointer-events:none;display:none}
#tooltip .tt-name{font-size:8px;letter-spacing:2px;margin-bottom:3px;font-family:'Share Tech Mono';color:#9bc}
#tooltip .tt-body{font-size:8px;color:#556;font-family:'Share Tech Mono';line-height:1.8}
#tooltip .tt-cd{font-size:7px;color:#665;font-family:'Share Tech Mono';margin-top:4px}
#ach-notif{position:fixed;bottom:22px;left:50%;transform:translateX(-50%) translateY(55px);background:#111;border:1px dashed #543;padding:9px 18px;font-size:9px;letter-spacing:1px;color:#ba7;font-family:'Share Tech Mono';z-index:300;pointer-events:none;transition:transform .35s ease,opacity .35s ease;opacity:0;white-space:nowrap}
#ach-notif.show{transform:translateX(-50%) translateY(0);opacity:1}
</style>
</head>
<body>
<canvas id="c"></canvas>
<div id="death-overlay"></div>
<div id="tooltip"><div class="tt-name" id="tt-name"></div><div class="tt-body" id="tt-body"></div><div class="tt-cd" id="tt-cd"></div></div>
<div id="ach-notif"></div>

<div id="ach-modal">
  <div class="modal-title">ACHIEVEMENTS</div>
  <div class="ach-grid" id="ach-grid"></div>
  <button class="btn bc" id="btn-ach-close"><span>&#8592; BACK</span></button>
</div>

<div id="ui">
  <div id="hud" class="off">
    <div id="hud-top">
      <div style="display:flex;flex-direction:column;gap:2px">
        <div class="hlbl">SCORE</div>
        <div class="hbig" id="sv">000000</div>
        <div class="hsub" id="hd-mult">x1</div>
      </div>
      <div id="sector-pill">SECTOR I</div>
      <div id="coins-pill">&#x2B21; <span id="coins-d">0</span></div>
    </div>
    <div id="hud-bot">
      <div class="bgrp">
        <div class="hlbl">SHIELDS</div>
        <div class="bwrap" style="width:108px"><div class="bfill" id="sh-fill"></div></div>
      </div>
      <div id="timer-d">0:00</div>
      <div class="bgrp r">
        <div id="ab-lbl" class="hlbl">ABILITY</div>
        <div class="bwrap" style="width:108px"><div class="bfill" id="ab-fill"></div></div>
      </div>
    </div>
  </div>
  <div id="bnd-flash"></div>
  <div id="pop"></div>

  <div id="start" class="layer sbg">
    <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 680 280" width="min(100%,520px)" style="display:block;margin-bottom:18px">

      <line x1="220" y1="9" x2="220" y2="271" stroke="#1a2518" stroke-width="0.6"/>
      <circle cx="152" cy="140" r="90" fill="none" stroke="#1f3020" stroke-width="1" stroke-dasharray="4,6"/>
      <circle cx="152" cy="140" r="62" fill="none" stroke="#182818" stroke-width="0.8"/>
      <circle cx="152" cy="140" r="34" fill="none" stroke="#141e14" stroke-width="0.8"/>
      <line x1="152" y1="40" x2="152" y2="80" stroke="#1f3020" stroke-width="0.8" opacity="0.7"/>
      <line x1="152" y1="200" x2="152" y2="240" stroke="#1f3020" stroke-width="0.8" opacity="0.7"/>
      <line x1="52" y1="140" x2="92" y2="140" stroke="#1f3020" stroke-width="0.8" opacity="0.7"/>

        <polygon points="-3,-58 3,-58 6,28 -6,28" fill="#bde8ff" opacity="0.25"/>
        <ellipse cx="0" cy="-18" rx="5" ry="8" fill="#001a22" opacity="0.9"/>

      <text x="272" y="116" font-family="'Share Tech Mono',monospace" font-size="70" font-weight="400" fill="#7ab8d0" letter-spacing="2">JANKY</text>
      <text x="272" y="196" font-family="'Share Tech Mono',monospace" font-size="70" font-weight="400" fill="#7ab8d0" letter-spacing="2">RUNNER</text>

    <div class="brow">
      <button class="btn bc" id="btn-play"><span>LAUNCH</span></button>
      <button class="btn bg2" id="btn-hs"><span>HANGAR</span></button>

    <div class="brow" style="margin-top:2px">
      <button class="btn bw2" id="btn-ach-open"><span>&#127942; ACHIEVEMENTS</span></button>

  </div>

  <div id="pause-over">
    <h2>PAUSED</h2>
    <p class="ph">ESC TO RESUME</p>

    <button class="btn bred" id="btn-quit"><span>QUIT TO MENU</span></button>
  </div>

  <div id="ov" class="layer off" style="cursor:default;align-items:center;justify-content:flex-start">
    <div style="width:100%;max-width:480px;margin-bottom:14px">
      <div class="ov-title">SHIP DESTROYED</div>
      <div class="ov-sub">RUN OVERVIEW</div>
    </div>
    <div class="stat-grid" id="stat-grid"></div>
    <div class="shdr">MILESTONES</div>
    <div class="ml-list" id="ml-list"></div>
    <div class="earn-box" id="earn-box"></div>
    <div class="shdr">LEADERBOARD</div>

    <div class="brow">

      <button class="btn bg2" id="btn-ho"><span>HANGAR</span></button>

      </div>
    </div>
    <button class="btn bc" id="btn-back"><span>&#8592; BACK</span></button>
  </div>
</div>

function fireAbility(){

  if(!sk.holdable&&abilTimer>0)return;
  abilActive=true;abilUses++;
  if(!sk.holdable){abilTimer=sk.acd;abilActiveT=sk.adur;}
  switch(sk.ability){
    case 'PHASE':phasing=true;asteroids.forEach(a=>{a.material=AMAT_PH[Math.floor(Math.random()*AMAT_PH.length)].clone();});if(ship)ship.group.children.forEach(c=>{if(c.material&&!c.isLight){c.material=c.material.clone();c.material.transparent=true;c.material.opacity=.28;}});popMsg('PHASE!',sk.acolor);break;

    case 'SHIELD PULSE':shields=Math.min(shields+1,3);endAbility();popMsg('SHIELD +1!',sk.acolor);break;
    case 'EMP BLAST':doEMP(sk,4.5,3,0x00ff88);endAbility();break;
    case 'NOVA BURST':doNovaBurst(sk);endAbility();break;
    case 'CLOAK':cloaked=true;if(ship)ship.group.visible=false;popMsg('CLOAK!',sk.acolor);break;

    default:popMsg(sk.ability+'!',sk.acolor);
  }
}

function doEMP(sk,radius,cpr,col){
  const r2=radius*radius;let destroyed=0;for(let i=asteroids.length-1;i>=0;i--){const a=asteroids[i];const dx=shipX-a.position.x,dy=shipY-a.position.y;if(dx*dx+dy*dy<r2){burst(a.position.x,a.position.y,a.position.z,col);scene.remove(a);asteroids.splice(i,1);score+=40*mult;destroyed++;}}
  if(destroyed>0){const earned=destroyed*cpr;coins+=earned;writeSv();_co=-1;popMsg((sk?sk.ability:'EMP')+'! +'+earned+' \u2B21',sk?sk.acolor:'#0f8');}else popMsg((sk?sk.ability:'EMP')+'!',sk?sk.acolor:'#0f8');
  empMesh.material.color.setHex(sk?parseInt(sk.acolor.replace('#',''),16):0x00ff88);empMesh.position.set(shipX,shipY,-3);empMesh.scale.setScalar(1);empMesh.material.opacity=.85;empT=.5;
}
function doNovaBurst(sk){
  const outerR2=6*6,innerR2=1.5*1.5;let destroyed=0;for(let i=asteroids.length-1;i>=0;i--){const a=asteroids[i];const dx=shipX-a.position.x,dy=shipY-a.position.y;const d2=dx*dx+dy*dy;if(d2<outerR2&&d2>innerR2){burst(a.position.x,a.position.y,a.position.z,parseInt(sk.acolor.replace('#',''),16));scene.remove(a);asteroids.splice(i,1);score+=50*mult;destroyed++;}}
  if(destroyed>0){const earned=destroyed*5;coins+=earned;writeSv();_co=-1;popMsg('NOVA! +'+earned+' \u2B21',sk.acolor);}else popMsg('NOVA BURST!',sk.acolor);
  empMesh.material.color.setHex(parseInt(sk.acolor.replace('#',''),16));empMesh.position.set(shipX,shipY,-3);empMesh.scale.setScalar(1);empMesh.material.opacity=.9;empT=.6;
}
function doWarp(sk){
  let attempts=0,wx,wy;do{wx=(Math.random()-.5)*BX*1.8;wy=(Math.random()-.5)*BY*1.8;attempts++;}while(attempts<20&&asteroids.some(a=>{const dx=wx-a.position.x,dy=wy-a.position.y;return dx*dx+dy*dy<1.5*1.5&&Math.abs(a.position.z+3)<2;}));
  burst(shipX,shipY,-3,parseInt(sk.acolor.replace('#',''),16));shipX=wx;shipY=wy;velX=0;velY=0;burst(wx,wy,-3,parseInt(sk.acolor.replace('#',''),16));popMsg('WARP!',sk.acolor);
}

function tickAbility(dt){
  const sk=getShip();
  if(sk.holdable){
    const spaceHeld=keys['Space'];
    if(spaceHeld&&fuelTank>0){
      if(!abilActive){abilActive=true;abilUses++;}
      fuelTank=Math.max(0,fuelTank-sk.fuelDrain*dt);
      if(fuelTank<=0){abilActive=false;fuelTank=0;}
    } else {
      abilActive=false;
      fuelTank=Math.min(1,fuelTank+sk.fuelRefill*dt);
    }
    abilPct=fuelTank;
  } else {
    if(keys['Space']&&abilTimer<=0&&!abilActive){fireAbility();keys['Space']=false;}
    if(abilActive&&abilActiveT>0){abilActiveT-=dt;if(abilActiveT<=0)endAbility();}
    if(abilTimer>0)abilTimer=Math.max(0,abilTimer-dt);
    abilPct=abilTimer>0?1-abilTimer/sk.acd:1;
  }
  if(shockwaveActive){const pushR2=3*3;for(let i=0;i<asteroids.length;i++){const a=asteroids[i];const dx=a.position.x-shipX,dy=a.position.y-shipY;const d2=dx*dx+dy*dy;if(d2<pushR2&&d2>0.001){const d=Math.sqrt(d2);a.userData.vx+=dx/d*0.15;a.userData.vy+=dy/d*0.15;}const fdx=shipX-a.position.x,fdy=shipY-a.position.y;const fd=Math.sqrt(fdx*fdx+fdy*fdy)+.001;if(fd<6)a.position.z+=0.06;}}
  if(empT>0){empT-=dt*1.6;empMesh.scale.setScalar(1+(1-empT)*8);empMesh.material.opacity=empT;if(empT<=0)empMesh.material.opacity=0;}
}
function separateAsteroids(){
  for(let i=0;i<asteroids.length;i++){
    const a=asteroids[i];
    for(let j=i+1;j<asteroids.length;j++){
      const b=asteroids[j];
      const dx=a.position.x-b.position.x,dy=a.position.y-b.position.y,dz=a.position.z-b.position.z;
      const d2=dx*dx+dy*dy+dz*dz;
      const minD=a.userData.sz+b.userData.sz+.12;
      if(d2<minD*minD&&d2>0.0001){
        const d=Math.sqrt(d2);
        const nx=dx/d,ny=dy/d;
        const overlap=(minD-d)*.52;
        a.position.x+=nx*overlap;a.position.y+=ny*overlap;
        b.position.x-=nx*overlap;b.position.y-=ny*overlap;
        const dvx=a.userData.vx-b.userData.vx;const dvy=a.userData.vy-b.userData.vy;
        const dot=dvx*nx+dvy*ny;
        if(dot<0){
          const impulse=dot*0.9;
          a.userData.vx-=impulse*nx;a.userData.vy-=impulse*ny;
          b.userData.vx+=impulse*nx;b.userData.vy+=impulse*ny;
        }
      }
    }
    const ud=a.userData;
    if(a.position.x<-BX+ud.sz){a.position.x=-BX+ud.sz;ud.vx=Math.abs(ud.vx)*0.7;}
    if(a.position.x>BX-ud.sz){a.position.x=BX-ud.sz;ud.vx=-Math.abs(ud.vx)*0.7;}
    if(a.position.y<-BY+ud.sz){a.position.y=-BY+ud.sz;ud.vy=Math.abs(ud.vy)*0.7;}
    if(a.position.y>BY-ud.sz){a.position.y=BY-ud.sz;ud.vy=-Math.abs(ud.vy)*0.7;}
  }
}
function initGame(){
  asteroids.forEach(a=>scene.remove(a));pups.forEach(p=>scene.remove(p));asteroids=[];pups=[];
  PPOOL.forEach(p=>{p.userData.on=false;p.material.opacity=0;p.visible=false;});
  if(ship){ship.group.children.forEach(c=>{if(c.material&&!c.isLight){c.material.transparent=false;c.material.opacity=1;}});scene.remove(ship.group);}
  empMesh.material.opacity=0;empT=0;
  score=0;shields=3;mult=1;comboT=0;gtime=0;baseSpd=5;fuelTank=1;
  shipX=0;shipY=0;velX=0;velY=0;camX=0;camY=0;shakeM=0;bndT=0;
  invincible=false;invT=0;phasing=false;timeSlowed=false;cloaked=false;shockwaveActive=false;dying=false;dyingT=0;deathReady=false;
  abilPct=1;abilTimer=0;abilActive=false;abilActiveT=0;abilUses=0;
  _s=-1;_sh=-1;_ab=-1;_sec=-1;_t=-1;_co=-1;_ml=-1;frameN=0;
  runStats={t:0,s:0,sec:0,mc:0,au:0};
  const ov=document.getElementById('ov');ov.classList.remove('fadein');
  const sk=getShip();D.abLbl.textContent=sk.holdable?sk.ability+' (HOLD)':sk.ability;D.abFill.style.background=sk.abar;
  ship=buildShipMesh(equipped);scene.add(ship.group);
  for(let i=0;i<5;i++){const a=spawnAst(baseSpd,0,0,'random');a.position.z=-14-Math.random()*42;asteroids.push(a);scene.add(a);}
  rings.forEach((r,i)=>{r.position.z=-18-i*18;});
  showGame();state='playing';updateHUD();
}
function checkCollisions(dt){
  const prevX=shipX-velX*dt*60,prevY=shipY-velY*dt*60;const canHit=!invincible&&!phasing&&!cloaked;
  for(let i=asteroids.length-1;i>=0;i--){
    const a=asteroids[i],sz=a.userData.sz;const dx=shipX-a.position.x,dy=shipY-a.position.y,dz=-3-a.position.z;const d2=dx*dx+dy*dy+dz*dz;const pdx=prevX-a.position.x,pdy=prevY-a.position.y;const pd2=pdx*pdx+pdy*pdy+dz*dz;const thr=sz*.6+.22;
    if(d2<thr*thr||pd2<thr*thr){if(canHit){hitShip(a.position.x,a.position.y,a.position.z);scene.remove(a);asteroids.splice(i,1);}continue;}
    if(a.position.z>5){score+=22*mult;comboT=3.5;mult=Math.min(mult+1,10);runStats.mc=Math.max(runStats.mc,mult);if(mult>=2&&mult%2===0)popMsg('x'+mult+'!');burst(a.position.x,a.position.y,a.position.z,0x0044bb);scene.remove(a);asteroids.splice(i,1);}
  }
  for(let i=pups.length-1;i>=0;i--){const p=pups[i];const dx=shipX-p.position.x,dy=shipY-p.position.y;if(dx*dx+dy*dy<.5){shields=Math.min(shields+1,3);popMsg('+1 SHIELD','#00ffff');burst(p.position.x,p.position.y,p.position.z,0x00ccff);scene.remove(p);pups.splice(i,1);}else if(p.position.z>5){scene.remove(p);pups.splice(i,1);}}
}
function hitShip(ax,ay,az){shields--;shakeM=.48;invincible=true;invT=2.2;mult=1;comboT=0;burst(ax,ay,az,0xff2200);if(shields<=0)startDeathCutscene();}
function startDeathCutscene(){
  state='dying';dying=true;dyingT=0;deathReady=false;
  const overlay=document.getElementById('death-overlay');overlay.style.display='block';overlay.classList.add('flash');setTimeout(()=>{overlay.style.display='none';overlay.classList.remove('flash');},450);
}
function tickDeathCutscene(dt){
  dyingT+=dt;const t=dyingT;
  if(ship){ship.group.position.y=shipY-t*t*2;ship.group.rotation.z+=Math.sin(t*8)*.05;const fade=Math.max(0,1-t*1.2);ship.group.children.forEach(c=>{if(c.material&&!c.isLight){c.material.transparent=true;c.material.opacity=fade;}});ship.glow.material.opacity=fade;ship.light.intensity=fade*.9;}
  if(t>1.4&&!deathReady){deathReady=true;finishGameOver();}
}
function finishGameOver(){
  state='gameover';
  achStats.deaths=(achStats.deaths||0)+1;const sector=Math.min(Math.floor(gtime/25)+1,9);
  runStats.t=gtime;runStats.s=score;runStats.sec=sector;runStats.au=abilUses;
  achStats.maxSec=Math.max(achStats.maxSec||0,sector);achStats.maxScore=Math.max(achStats.maxScore||0,Math.floor(score));achStats.maxCombo=Math.max(achStats.maxCombo||0,runStats.mc);achStats.maxTime=Math.max(achStats.maxTime||0,gtime);achStats.totalAbil=(achStats.totalAbil||0)+abilUses;
  checkAchievements();
  let earned=0;const mlHTML=MILESTONES.map(m=>{const ok=m.fn(runStats);if(ok)earned+=m.c;return`<div class="ml-row${ok?' hit':''}"><span class="mn">${m.lbl}</span><span class="mc">${ok?'+'+m.c+' \u2B21':'—'}</span></div>`;}).join('');
  coins+=earned;writeSv();
  const mins=Math.floor(gtime/60),secs=Math.floor(gtime%60);
  document.getElementById('stat-grid').innerHTML=`<div class="stat-card"><div class="sc-lbl">SCORE</div><div class="sc-val">${String(Math.floor(score)).padStart(6,'0')}</div></div><div class="stat-card"><div class="sc-lbl">TIME</div><div class="sc-val">${mins}:${secs<10?'0':''}${secs}</div></div><div class="stat-card"><div class="sc-lbl">SECTOR</div><div class="sc-val">${SECN[sector-1]}</div></div><div class="stat-card"><div class="sc-lbl">MAX COMBO</div><div class="sc-val">x${runStats.mc}</div></div><div class="stat-card g"><div class="sc-lbl">COINS EARNED</div><div class="sc-val">${earned} \u2B21</div></div><div class="stat-card"><div class="sc-lbl">ABILITY USES</div><div class="sc-val">${abilUses}</div></div>`;
  document.getElementById('ml-list').innerHTML=mlHTML;document.getElementById('earn-box').innerHTML=`<span>TOTAL COINS</span><span class="earn-big">${Math.floor(coins)} \u2B21</span>`;
  hs.push(Math.floor(score));hs.sort((a,b)=>b-a);hs=hs.slice(0,5);writeSv();
  const curSc=Math.floor(score);document.getElementById('hs-list').innerHTML=hs.slice(0,5).map((s,i)=>`<div class="hs-row${s===curSc?' nw':''}"><span class="rk">#${i+1}</span><span class="sv2">${String(s).padStart(6,'0')}</span></div>`).join('');
  showScreen('ov');
}

const clock=new THREE.Clock();
function animate(){
  requestAnimationFrame(animate);
  const dt=Math.min(clock.getDelta(),.05);frameN++;
  if(state==='dying'){tickDeathCutscene(dt);renderer.render(scene,cam);return;}
  if(state!=='playing'){renderer.render(scene,cam);return;}
  gtime+=dt;
  const sector=Math.min(Math.floor(gtime/25),8);baseSpd=5+sector*3.0;const maxA=5+sector*2;const spawnP=Math.min(.14+sector*.025,.5);const homingF=Math.min(.25+sector*.09,.85);const sideF=Math.min(sector*.06,.3);
  const sk=getShip();
  const boosting=sk.holdable&&abilActive;
  const spdMult=boosting?(sk.boostMult||2.0):sk.ability==='AFTERBURN'&&abilActive?2.9:1.0;
  const timeMult=timeSlowed?.28:1.0;const cspd=baseSpd*spdMult;
  const KS=0.72;
  const kx=(keys['ArrowLeft']||keys['KeyA'])?-1:(keys['ArrowRight']||keys['KeyD'])?1:0;
  const ky=(keys['ArrowUp']||keys['KeyW'])?1:(keys['ArrowDown']||keys['KeyS'])?-1:0;
  velX+=kx*KS*dt;velY+=ky*KS*dt;
  velX*=.80;velY*=.80;
  const maxV=boosting?1.6:0.85;const vm=Math.sqrt(velX*velX+velY*velY);if(vm>maxV){velX=velX/vm*maxV;velY=velY/vm*maxV;}
  shipX+=velX*dt*60;shipY+=velY*dt*60;
  let wall=false;
  if(shipX<-BX){shipX=-BX;velX=Math.abs(velX)*.22;wall=true;}if(shipX>BX){shipX=BX;velX=-Math.abs(velX)*.22;wall=true;}if(shipY<-BY){shipY=-BY;velY=Math.abs(velY)*.22;wall=true;}if(shipY>BY){shipY=BY;velY=-Math.abs(velY)*.22;wall=true;}
  if(wall){bndT=.22;shakeM=Math.max(shakeM,.1);}
  if(bndT>0){bndT-=dt;D.bnd.classList.add('lit');}else D.bnd.classList.remove('lit');
  ship.group.position.set(shipX,shipY,-3);ship.group.rotation.z+=((-velX*.3)-ship.group.rotation.z)*.16;ship.group.rotation.x+=((-velY*.14)-ship.group.rotation.x)*.16;
  const gs=boosting?.16+Math.sin(gtime*28)*.04:phasing?.04:.08;ship.glow.scale.setScalar(gs/.08);ship.light.intensity=boosting?2.8:phasing?.18:.9;
  if(cloaked)ship.group.visible=false;else if(!invincible)ship.group.visible=true;
  const tcx=shipX*.5,tcy=shipY*.4;camX+=(tcx-camX)*.09;camY+=(tcy-camY)*.09;
  if(shakeM>0){cam.position.set(camX+(Math.random()-.5)*shakeM,camY+(Math.random()-.5)*shakeM,2.5);shakeM*=.74;if(shakeM<.003)shakeM=0;}else cam.position.set(camX,camY,2.5);
  cam.lookAt(shipX*.14,shipY*.11,-5);
  tickAbility(dt);
  if(asteroids.length<maxA&&Math.random()<spawnP){const r=Math.random();let type='random';if(r<homingF)type='homing';else if(r<homingF+sideF)type='side';const a=spawnAst(cspd,shipX,shipY,type);asteroids.push(a);scene.add(a);}
  if(Math.random()<.005){const p=spawnPup(cspd);pups.push(p);scene.add(p);}
  const asMul=timeMult;
  for(let i=asteroids.length-1;i>=0;i--){
    const a=asteroids[i];const ud=a.userData;a.position.z+=cspd*asMul*dt;a.rotation.x+=ud.rx;a.rotation.y+=ud.ry;a.rotation.z+=ud.rz;
    if(ud.homingStr>0){const targetX=cloaked?shipX+(Math.random()-.5)*2:shipX;const targetY=cloaked?shipY+(Math.random()-.5)*2:shipY;const adx=targetX-a.position.x,ady=targetY-a.position.y;const dist=Math.sqrt(adx*adx+ady*ady)+.001;const maxH=2.5;const accel=ud.homingStr*60*dt;ud.vx+=adx/dist*accel;ud.vy+=ady/dist*accel;const vs=Math.sqrt(ud.vx*ud.vx+ud.vy*ud.vy);if(vs>maxH){ud.vx=ud.vx/vs*maxH;ud.vy=ud.vy/vs*maxH;}ud.vx*=.98;ud.vy*=.98;a.position.x+=ud.vx*asMul*dt;a.position.y+=ud.vy*asMul*dt;}
    if(a.position.z>7){scene.remove(a);asteroids.splice(i,1);}
  }
  for(let i=pups.length-1;i>=0;i--){const p=pups[i];p.position.z+=p.userData.spd*dt;p.rotation.y+=.04;if(p.position.z>7){scene.remove(p);pups.splice(i,1);}}
  rings.forEach(r=>{r.position.z+=cspd*dt;if(r.position.z>7)r.position.z-=108;});
  for(let i=0;i<PPOOL.length;i++){const p=PPOOL[i];if(!p.userData.on)continue;const d=p.userData,arr=p.geometry.attributes.position.array;for(let j=0;j<PN;j++){arr[j*3]+=d.vx[j];arr[j*3+1]+=d.vy[j];arr[j*3+2]+=d.vz[j]+cspd*dt*.22;}p.geometry.attributes.position.needsUpdate=true;d.life-=dt*2.2;p.material.opacity=d.life;if(d.life<=0){d.on=false;p.material.opacity=0;p.visible=false;}}
  if(invincible){invT-=dt;if(!cloaked)ship.group.visible=Math.floor(gtime*14)%2===0;if(invT<=0){invincible=false;if(!cloaked)ship.group.visible=true;}}
  if(comboT>0){comboT-=dt;if(comboT<=0)mult=Math.max(1,mult-1);}
  separateAsteroids();checkCollisions(dt);score+=cspd*dt*.48;if(frameN%3===0)updateHUD();
  renderer.render(scene,cam);
}

document.getElementById('btn-play').addEventListener('click',()=>initGame());
document.getElementById('btn-replay').addEventListener('click',()=>initGame());
document.getElementById('btn-home').addEventListener('click',()=>showScreen('start'));
document.getElementById('btn-ach-open').addEventListener('click',()=>{buildAchModal();document.getElementById('ach-modal').classList.add('show');});
document.getElementById('btn-ach-close').addEventListener('click',()=>document.getElementById('ach-modal').classList.remove('show'));
document.getElementById('btn-resume').addEventListener('click',()=>{state='playing';pauseEl.classList.remove('show');});
document.getElementById('btn-quit').addEventListener('click',()=>{pauseEl.classList.remove('show');state='menu';asteroids.forEach(a=>scene.remove(a));pups.forEach(p=>scene.remove(p));asteroids=[];pups=[];if(ship){scene.remove(ship.group);ship=null;}showScreen('start');});
function openShop(from){buildShop();document.getElementById('shop').dataset.from=from;showScreen('shop');}
function closeShop(){showScreen(document.getElementById('shop').dataset.from||'start');}
document.getElementById('btn-hs').addEventListener('click',()=>openShop('start'));
document.getElementById('btn-ho').addEventListener('click',()=>openShop('ov'));
document.getElementById('btn-back').addEventListener('click',closeShop);
const CODES={
  'viper01':    {ships:['viper'],    msg:'VIPER UNLOCKED!'},
  'burnbaby':   {ships:['inferno'],  msg:'INFERNO UNLOCKED!'},
  'ghostmode':  {ships:['phantom'],  msg:'PHANTOM UNLOCKED!'},
  'goldenage':  {ships:['aurum'],    msg:'AURUM UNLOCKED!'},
  'sp3ct3r':    {ships:['specter'],  msg:'SPECTER UNLOCKED!'},
  'greenpoison':{ships:['venom'],    msg:'VENOM UNLOCKED!'},
  'supernova':  {ships:['nova'],     msg:'NOVA UNLOCKED!'},
  'shadowwalk': {ships:['wraith'],   msg:'WRAITH UNLOCKED!'},
  'bigrock':    {ships:['titan'],    msg:'TITAN UNLOCKED!'},
  'lightspeed': {ships:['herald'],   msg:'HERALD UNLOCKED!'},
  'iwillbethere':{ships:SHIPS.map(s=>s.id), msg:'ALL SHIPS UNLOCKED!'},
};
function redeemCode(){
  const inp=document.getElementById('code-input');
  const msg=document.getElementById('code-msg');
  const code=inp.value.trim().toLowerCase();
  if(!code){msg.style.color='#744';msg.textContent='enter a code';return;}
  if(usedCodes.includes(code)){msg.style.color='#744';msg.textContent='already used';return;}
  const entry=CODES[code];
  if(!entry){msg.style.color='#744';msg.textContent='invalid code';return;}
  let added=0;
  entry.ships.forEach(id=>{if(!owned.includes(id)){owned.push(id);added++;}});
  usedCodes.push(code);
  writeSv();
  checkAchievements();
  inp.value='';
  msg.style.color='#6a9';
  msg.textContent=added>0?entry.msg:'already owned';
  buildShop();
}
document.getElementById('btn-redeem').addEventListener('click',redeemCode);
document.getElementById('code-input').addEventListener('keydown',e=>{if(e.code==='Enter')redeemCode();});
animate();
